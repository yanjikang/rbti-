<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>精神状态鉴定中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #ff6b6b;
            --primary-light: #ffe5e5;
            --bg: #fafafa;
            --card-bg: #ffffff;
            --text: #333;
            --text-light: #888;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 进度条 */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #eee;
            z-index: 100;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #ff8e8e);
            transition: width 0.3s ease;
        }

        /* 主容器 */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 60px 20px 40px;
            min-height: 100vh;
        }

        /* 开始页 */
        .start-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        .start-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), #ff8e8e);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .start-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 16px;
        }

        .start-desc {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.8;
            margin-bottom: 40px;
            max-width: 300px;
        }

        .start-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 60px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 107, 0.4);
        }

        /* 问题卡片容器 */
        .questions-wrapper {
            position: relative;
            overflow: hidden;
        }

        .question-card {
            display: none;
            animation: slideIn 0.4s ease;
        }

        .question-card.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(-30px);
            }
        }

        .question-number {
            font-size: 14px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* 多选提示 */
        .multi-hint {
            background: var(--primary-light);
            color: var(--primary);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 24px;
        }

        /* 选项 */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background: var(--card-bg);
            border: 2px solid #eee;
            border-radius: 16px;
            padding: 18px 20px;
            font-size: 15px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            padding-left: 50px;
        }

        .option-item:hover {
            border-color: #ddd;
            background: #fafafa;
        }

        .option-item.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .option-item::before {
            content: '';
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
        }

        .option-item.selected::before {
            background: var(--primary);
            border-color: var(--primary);
            content: '✓';
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 40px;
        }

        .nav-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn.prev {
            background: #f0f0f0;
            color: var(--text);
        }

        .nav-btn.next {
            background: var(--primary);
            color: white;
        }

        .nav-btn.next:disabled {
            background: #ddd;
            cursor: not-allowed;
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        /* 滑动提示 */
        .swipe-hint {
            text-align: center;
            margin-top: 20px;
            color: var(--text-light);
            font-size: 13px;
            opacity: 0.7;
        }

        /* 结果页 */
        .result-page {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .result-name {
            font-size: 26px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 8px;
        }

        .result-code {
            font-size: 16px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 20px;
        }

        .result-image {
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .result-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result-desc {
            text-align: left;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-light);
            white-space: pre-line;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            justify-content: center;
        }

        .result-tag {
            background: var(--primary-light);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .result-rate {
            background: linear-gradient(135deg, var(--primary), #ff8e8e);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 16px;
        }

        .action-btns {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.primary {
            background: var(--primary);
            color: white;
        }

        .action-btn.secondary {
            background: #f0f0f0;
            color: var(--text);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="container">
        <!-- 开始页 -->
        <div class="start-page" id="startPage">
            <div class="start-icon">🧠</div>
            <h1 class="start-title">精神状态鉴定中心</h1>
            <p class="start-desc">36道离谱问题<br>测出你的精神状态有多离谱<br>支持多选 · 纯属恶搞</p>
            <button class="start-btn" onclick="startTest()">开始鉴定</button>
        </div>

        <!-- 问题区域 -->
        <div class="questions-wrapper" id="questionsWrapper"></div>

        <!-- 结果页 -->
        <div class="result-page" id="resultPage"></div>
    </div>

        let currentQuestion = 0;
        let answers = {};

        function startTest() {
            document.getElementById('startPage').classList.add('hidden');
            renderQuestions();
        }

        function renderQuestions() {
            const wrapper = document.getElementById('questionsWrapper');
            wrapper.innerHTML = '';
            
            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = `question-card ${idx === currentQuestion ? 'active' : ''}`;
                card.id = `question-${idx}`;
                
                card.innerHTML = `
                    <div class="question-number">第 ${idx + 1} / ${questions.length} 题</div>
                    <div class="question-text">${q.text}</div>
                    <div class="multi-hint">💡 可多选</div>
                    <div class="options-list">
                        ${q.options.map((opt, optIdx) => `
                            <div class="option-item" onclick="selectOption(${idx}, ${optIdx}, this)">
                                ${opt}
                            </div>
                        `).join('')}
                    </div>
                    <div class="nav-buttons">
                        <button class="nav-btn prev" onclick="prevQuestion()" ${idx === 0 ? 'style="visibility:hidden"' : ''}>上一题</button>
                        <button class="nav-btn next" onclick="nextQuestion()" ${idx === questions.length - 1 ? '' : ''} id="nextBtn-${idx}">${idx === questions.length - 1 ? '查看结果' : '下一题'}</button>
                    </div>
                    <div class="swipe-hint">← 左右滑动切换 →</div>
                `;
                
                wrapper.appendChild(card);
            });
            
            updateProgress();
        }

        function selectOption(questionIdx, optionIdx, element) {
            if (!answers[questionIdx]) answers[questionIdx] = [];
            
            const idx = answers[questionIdx].indexOf(optionIdx);
            if (idx > -1) {
                answers[questionIdx].splice(idx, 1);
                element.classList.remove('selected');
            } else {
                answers[questionIdx].push(optionIdx);
                element.classList.add('selected');
            }
            
            // 更新按钮状态
            const nextBtn = document.getElementById(`nextBtn-${questionIdx}`);
            if (nextBtn) {
                nextBtn.disabled = answers[questionIdx].length === 0;
            }
        }

        function nextQuestion() {
            if (!answers[currentQuestion] || answers[currentQuestion].length === 0) {
                alert('请至少选择一个选项');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                document.getElementById(`question-${currentQuestion}`).classList.remove('active');
                currentQuestion++;
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
                updateProgress();
                window.scrollTo(0, 0);
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                document.getElementById(`question-${currentQuestion}`).classList.remove('active');
                currentQuestion--;
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
                updateProgress();
                window.scrollTo(0, 0);
            }
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function showResult() {
            document.getElementById('questionsWrapper').classList.add('hidden');
            document.getElementById('progressBar').classList.add('hidden');
            
            // 计算结果
            const tagCount = {};
            Object.values(answers).forEach(opts => {
                opts.forEach(optIdx => {
                    // 简单的标签映射
                    const tags = ['哲思', '社死', '摆烂', '社牛', '硬核', '暴躁', '乐观', '嘴硬', '戏精', '真香', '励志', '自信'];
                    const tag = tags[optIdx % tags.length];
                    tagCount[tag] = (tagCount[tag] || 0) + 1;
                });
            });
            
            let bestMatch = personalityTypes[0];
            let maxScore = 0;
            
            personalityTypes.forEach(type => {
                let score = 0;
                type.tags.forEach(tag => {
                    if (tagCount[tag]) score += tagCount[tag];
                });
                if (score > maxScore) {
                    maxScore = score;
                    bestMatch = type;
                }
            });
            
            if (maxScore === 0) {
                bestMatch = personalityTypes[Math.floor(Math.random() * personalityTypes.length)];
            }
            
            const resultPage = document.getElementById('resultPage');
            resultPage.classList.remove('hidden');
            resultPage.innerHTML = `
                <div class="result-card">
                    <div class="result-label">你的精神状态是</div>
                    <div class="result-name">${bestMatch.name}</div>
                    <div class="result-code">${bestMatch.code}</div>
                    <div class="result-image">
                        <img src="${bestMatch.image}" alt="${bestMatch.name}" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=${bestMatch.code}'">
                    </div>
                    <div class="result-desc">${bestMatch.desc}</div>
                    <div class="result-tags">
                        ${bestMatch.tags.map(tag => `<span class="result-tag">${tag}</span>`).join('')}
                    </div>
                    <div class="result-rate">${bestMatch.rate}</div>
                </div>
                <div class="action-btns">
                    <button class="action-btn primary" onclick="location.reload()">再测一次</button>
                    <button class="action-btn secondary" onclick="downloadResult()">保存结果</button>
                </div>
            `;
            
            window.scrollTo(0, 0);
        }

        function downloadResult() {
            alert('请使用手机截图功能保存结果');
        }

        
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    
                    if (answers[currentQuestion] && answers[currentQuestion].length > 0) {
                        nextQuestion();
                    }
                } else {
                    
                    prevQuestion();
                }
            }
        }
    </script>
